<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Reference — Pingfin Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<style>
    :root {
        --primary: #0f172a;
        --accent: #3b82f6;
        --sidebar-bg: #f8fafc;
        --border: #e2e8f0;
        --text-main: #334155;
        --text-heading: #0f172a;
        --bg: #ffffff;
    }

    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        color: var(--text-main);
        background-color: var(--bg);
        line-height: 1.6;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* Sidebar */
    aside {
        width: 300px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        padding: 2rem 1.5rem;
        flex-shrink: 0;
    }

    .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--text-heading);
        margin-bottom: 2rem;
        text-decoration: none;
    }

    .nav-group { margin-bottom: 2rem; }
    .nav-title {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 0.75rem;
    }

    .nav-link {
        display: block;
        padding: 0.5rem 0.75rem;
        color: var(--text-main);
        text-decoration: none;
        font-size: 0.9rem;
        border-radius: 6px;
        transition: all 0.2s;
        margin-bottom: 0.25rem;
    }

    .nav-link:hover {
        background: #f1f5f9;
        color: var(--accent);
    }

    .nav-link.active {
        background: #eff6ff;
        color: var(--accent);
        font-weight: 600;
    }

    /* Main Content */
    main {
        flex-grow: 1;
        overflow-y: auto;
        padding: 4rem 10%;
        scroll-behavior: smooth;
    }

    .content-wrapper {
        max-width: 800px;
        margin: 0 auto;
    }

    h1 { font-size: 2.5rem; margin-top: 0; color: var(--text-heading); border-bottom: 2px solid var(--border); padding-bottom: 1rem; }
    h2 { font-size: 1.75rem; margin-top: 3rem; color: var(--text-heading); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h3 { font-size: 1.25rem; margin-top: 2rem; color: var(--text-heading); }

    code { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; background: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 4px; }
    pre code { background: none; padding: 0; }

    .method-badge {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        font-weight: 700;
        font-size: 0.75rem;
        margin-right: 0.5rem;
        text-transform: uppercase;
    }
    .get { background: #dcfce7; color: #166534; }
    .post { background: #dbeafe; color: #1e40af; }
    .put { background: #fef9c3; color: #854d0e; }
    .delete { background: #fee2e2; color: #991b1b; }

    table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.5rem 0;
        font-size: 0.9rem;
    }
    th { text-align: left; background: #f8fafc; padding: 0.75rem; border-bottom: 2px solid var(--border); }
    td { padding: 0.75rem; border-bottom: 1px solid var(--border); }

    blockquote {
        margin: 2rem 0;
        padding: 1rem 1.5rem;
        border-left: 4px solid var(--accent);
        background: #f0f9ff;
        color: #0369a1;
        border-radius: 0 8px 8px 0;
    }

    #loader {
        position: fixed;
        inset: 0;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    @media (max-width: 1024px) {
        aside { display: none; }
        main { padding: 2rem 5%; }
    }
</style>
</head>
<body>

<div id="loader">
    <div style="text-align: center;">
        <div style="font-size: 2rem; margin-bottom: 1rem;">🏦</div>
        <div style="font-weight: 600; color: var(--text-heading);">Documentatie genereren...</div>
    </div>
</div>

<aside id="sidebar">
    <a href="/" class="sidebar-brand">
        <span>🏦</span>
        <span id="side-bank-name">Pingfin API</span>
    </a>
    <div id="nav-content">
        <!-- Navigation links will be injected here -->
    </div>
</aside>

<main id="main">
    <div class="content-wrapper" id="docs-container">
        <!-- Markdown content will be rendered here -->
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-http.min.js"></script>

<script>
    const renderer = new marked.Renderer();
    
    // Custom header rendering to add IDs and build sidebar
    const toc = [];
    renderer.heading = function(text, level) {
        const id = text.toLowerCase().replace(/[^\w]+/g, '-');
        if (level <= 3) {
            toc.push({ text, level, id });
        }
        return `<h${level} id="${id}">${text}</h${level}>`;
    };

    // Style code blocks for Prism
    renderer.code = function(code, lang) {
        const language = lang || 'text';
        return `<pre><code class="language-${language}">${Prism.highlight(code, Prism.languages[language] || Prism.languages.text, language)}</code></pre>`;
    };

    // Handle method badges in text
    renderer.text = function(text) {
        return text.replace(/`(GET|POST|PUT|DELETE) (.*?)`/g, (match, method, path) => {
            return `<span class="method-badge ${method.toLowerCase()}">${method}</span><code>${path}</code>`;
        });
    };

    async function loadDocs() {
        try {
            const response = await fetch('api-docs.md');
            if (!response.ok) throw new Error('Kon documentatie niet laden');
            const markdown = await response.text();
            
            const container = document.getElementById('docs-container');
            container.innerHTML = marked.parse(markdown, { renderer });
            
            buildSidebar();
            
            // Get Bank Info
            try {
                const info = await fetch('/api/info').then(r => r.json());
                if (info.ok) {
                    document.getElementById('side-bank-name').textContent = info.data.name;
                    document.title = `API Reference — ${info.data.name}`;
                }
            } catch (e) {}

            document.getElementById('loader').style.display = 'none';

        } catch (error) {
            document.getElementById('loader').innerHTML = `<span style="color: red;">Fout: ${error.message}</span>`;
        }
    }

    function buildSidebar() {
        const nav = document.getElementById('nav-content');
        let currentGroup = null;

        toc.forEach(item => {
            if (item.level === 2) {
                currentGroup = document.createElement('div');
                currentGroup.className = 'nav-group';
                const title = document.createElement('div');
                title.className = 'nav-title';
                title.textContent = item.text.replace(/^\d+\.\s*/, '');
                currentGroup.appendChild(title);
                nav.appendChild(currentGroup);
                
                const link = document.createElement('a');
                link.href = `#${item.id}`;
                link.className = 'nav-link';
                link.textContent = 'Introductie';
                // currentGroup.appendChild(link); // Optional
            } else if (item.level === 3 && currentGroup) {
                const link = document.createElement('a');
                link.href = `#${item.id}`;
                link.className = 'nav-link';
                // Clean up the text for sidebar
                link.textContent = item.text.replace(/`(GET|POST|PUT|DELETE)`\s*/, '');
                currentGroup.appendChild(link);
            }
        });

        // Highlight active link on scroll
        const main = document.getElementById('main');
        main.addEventListener('scroll', () => {
            const headings = Array.from(document.querySelectorAll('h2, h3'));
            const scrollPos = main.scrollTop + 100;
            
            let activeId = null;
            for (const h of headings) {
                if (h.offsetTop <= scrollPos) {
                    activeId = h.id;
                }
            }

            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.toggle('active', link.getAttribute('href') === `#${activeId}`);
            });
        });
    }

    loadDocs();
</script>
</body>
</html>
